<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Mandiri</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); padding-bottom: 40px; }
        .header-app { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .btn-out { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .container { max-width: 450px; margin: 20px auto; width: 92%; }
        .waktu-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        .waktu-title { font-weight: bold; color: #333; margin-bottom: 10px; font-size: 15px; border-left: 4px solid var(--primary); padding-left: 8px; }
        .opsi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-opsi { padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; text-align: left; transition: 0.2s; }
        .btn-opsi.selected { background: #e8f5e9; border-color: var(--secondary); color: var(--primary); font-weight: bold; }
        .btn-simpan-all { width: 100%; padding: 14px; background: var(--secondary); color: white; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

<div class="header-app">
    <span id="nama-user-display">Santri</span>
    <button class="btn-out" onclick="logoutSiswa()">Keluar</button>
</div>

<div class="container">
    <div id="box-sholat"></div>
    <button class="btn-simpan-all" onclick="kirimSemuaJurnal()"><i class="fas fa-cloud-upload-alt"></i> Simpan Permanen ke Server</button>
</div>

<div class="loader" id="sholat-loader">
    <div style="text-align:center;"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Mengunci poin ibadahmu di server...</div>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbymySKegwMDiJneEe9LvyOFEuoub-HW-DHLxcAy5A1YMzhoam4_8z3k_JIXgImccu8q/exec";
    let sesiSiswa = JSON.parse(localStorage.getItem("user_siswa"));
    if(!sesiSiswa || sesiSiswa.role !== "siswa") { window.location.href = "index.html"; }

    const listWaktu = ["Subuh", "Zuhur", "Asar", "Magrib", "Isya"];
    const daftarPilihan = [
        { teks: "Berjamaah / Tepat", poin: 20 },
        { teks: "Awal Waktu", poin: 15 },
        { teks: "Tengah Waktu", poin: 10 },
        { teks: "Akhir Waktu", poin: 5 }
    ];
    let rincianPilihan = { "Subuh": 0, "Zuhur": 0, "Asar": 0, "Magrib": 0, "Isya": 0 };

    $(document).ready(function() {
        $("#nama-user-display").text("Santri: " + sesiSiswa.nama);
        buildFormSholat();
    });

    function buildFormSholat() {
        let html = "";
        listWaktu.forEach(w => {
            html += `<div class="waktu-card"><div class="waktu-title">Sholat ${w}</div><div class="opsi-grid">`;
            daftarPilihan.forEach(p => {
                html += `<button class="btn-opsi" data-waktu="${w}" data-poin="${p.poin}" onclick="pilihOpsi(this)">${p.teks} (+${p.poin})</button>`;
            });
            html += `</div></div>`;
        });
        $("#box-sholat").html(html);
    }

    function pilihOpsi(btn) {
        let waktu = $(btn).data("waktu");
        let poin = parseInt($(btn).data("poin"));
        $(`button[data-waktu="${waktu}"]`).removeClass("selected");
        $(btn).addClass("selected");
        rincianPilihan[waktu] = poin;
    }

    function kirimSemuaJurnal() {
        let tombolSimpan = $(".btn-simpan-all");
        // Kunci tombol agar anti-klik ganda
        tombolSimpan.prop("disabled", true).css("opacity", "0.5").text("Sedang Mengunci Poin...");
        $("#sholat-loader").css("display", "flex");

        let opsiHari = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
        let tanggalDanHari = new Date().toLocaleDateString('id-ID', opsiHari).replace(/,/g, '').replace(/\//g, '-'); 

        let totalSkorSiswa = rincianPilihan["Subuh"] + rincianPilihan["Zuhur"] + rincianPilihan["Asar"] + rincianPilihan["Magrib"] + rincianPilihan["Isya"];
        let teksFormatSheet = "S:" + rincianPilihan["Subuh"] + " | Z:" + rincianPilihan["Zuhur"] + " | A:" + rincianPilihan["Asar"] + " | M:" + rincianPilihan["Magrib"] + " | I:" + rincianPilihan["Isya"] + " [Total: " + totalSkorSiswa + " Poin]";

        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: { action: "simpanPoinSholat", nama: sesiSiswa.nama, tanggal: tanggalDanHari, rincianPoin: teksFormatSheet },
            dataType: "json",
            success: function(res) {
                $("#sholat-loader").hide();
                tombolSimpan.prop("disabled", false).css("opacity", "1").html('<i class="fas fa-cloud-upload-alt"></i> Simpan Permanen ke Server');
                if(res.status === "success") { alert("Alhamdulillah, jurnal sholat sukses tersimpan!"); }
            },
            error: function() { 
                $("#sholat-loader").hide(); 
                tombolSimpan.prop("disabled", false).css("opacity", "1").html('<i class="fas fa-cloud-upload-alt"></i> Simpan Permanen ke Server');
                alert("Koneksi bermasalah saat menyimpan."); 
            }
        });
    }

    function logoutSiswa() { localStorage.removeItem("user_siswa"); window.location.href = "index.html"; }
</script>
</body>
</html>
