<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Digital Santri</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --bg: #f1f3f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); padding-bottom: 40px; }
        .header-siswa { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 15px 15px; position: relative; }
        .btn-logout { position: absolute; left: 15px; top: 20px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .container { max-width: 450px; margin: 0 auto; width: 92%; }
        .profil-card { background: white; margin: -15px auto 20px; border-radius: 12px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 15px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; background: #e8f5e9; color: var(--primary); display: flex; justify-content: center; align-items: center; font-size: 22px; }
        .sholat-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.03); }
        .sholat-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .opsi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opsi { padding: 12px 8px; border: 2px solid #e9ecef; background: #f8f9fa; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-opsi.active-berjamaah { background: #d1e7dd; border-color: #0f5132; color: #0f5132; }
        .btn-opsi.active-awal { background: #cff4fc; border-color: #055160; color: #055160; }
        .btn-opsi.active-tengah { background: #fff3cd; border-color: #664d03; color: #664d03; }
        .btn-opsi.active-akhir { background: #f8d7da; border-color: #842029; color: #842029; }
        .btn-opsi.active-uzur { background: #f3e5f5; border-color: #6a1b9a; color: #6a1b9a; }
        .btn-simpan-all { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; color: white; flex-direction: column; }
    </style>
</head>
<body>

<div class="header-siswa">
    <button class="btn-logout" onclick="logoutSiswa()"><i class="fas fa-arrow-left"></i> Keluar</button>
    <h2>JURNAL SHOLAT</h2>
    <p style="font-size: 12px; opacity: 0.9;">Kunci Nilai Amalan Ibadahmu Hari Ini</p>
</div>

<div class="container">
    <div class="profil-card">
        <div class="avatar-box" id="avatar-gender"><i class="fas fa-user-graduate"></i></div>
        <div class="profil-info">
            <h4 id="nama-display">Nama Santri</h4>
            <p id="jk-display">Jenis Kelamin: -</p>
        </div>
    </div>
    <div id="container-jurnal"></div>
    <button class="btn-simpan-all" onclick="kirimSemuaJurnal()"><i class="fas fa-cloud-upload-alt"></i> Simpan Permanen ke Server</button>
</div>

<div class="loader-overlay" id="sholat-loader">
    <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 10px;"></i>
    <span>Mengunci poin ibadahmu di server...</span>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbzE-c7kUbnECWa4daQ4vrJfSQhzpU3awqjb8BRXt5szPmNV842nQTmcuYri0cwHnUUU/exec";
    // Cek baris ini di sholat.html Bapak
    let sesiSiswa = JSON.parse(localStorage.getItem("user_sholat"));

    if (!sesiSiswa || sesiSiswa.role !== "siswa") { 
        window.location.href = "index.html"; 
    }
    var rincianPilihan = { "Subuh": 0, "Zuhur": 0, "Asar": 0, "Magrib": 0, "Isya": 0 };

    $(document).ready(function() {
        $("#nama-display").text(sesiSiswa.nama);
        $("#jk-display").text("Jenis Kelamin: " + (sesiSiswa.jk === "L" ? "Laki-laki" : "Perempuan"));
        if(sesiSiswa.jk === "P") {
            $("#avatar-gender").html('<i class="fas fa-user-nurse"></i>').css("background", "#fce4ec").css("color", "#c2185b");
        }
        bikinFormSholat();
    });

    function bikinFormSholat() {
        const listWaktu = ["Subuh", "Zuhur", "Asar", "Magrib", "Isya"];
        let html = "";
        listWaktu.forEach(w => {
            html += `
                <div class="sholat-card" id="card-${w}">
                    <div class="sholat-title">Sholat ${w}</div>
                    <div class="opsi-grid">
                        ${sesiSiswa.jk === 'L' ? 
                        `<button class="btn-opsi" id="btn-${w}-20" onclick="pilihOpsi('${w}', 20, 'berjamaah')"><i class="fas fa-users"></i> Berjamaah (20)</button>` : 
                        `<button class="btn-opsi" id="btn-${w}-20" onclick="pilihOpsi('${w}', 20, 'uzur')"><i class="fas fa-venus-mars"></i> Uzur/Haid (20)</button>`}
                        <button class="btn-opsi" id="btn-${w}-15" onclick="pilihOpsi('${w}', 15, 'awal')"><i class="fas fa-stopwatch"></i> Awal Waktu (15)</button>
                        <button class="btn-opsi" id="btn-${w}-10" onclick="pilihOpsi('${w}', 10, 'tengah')"><i class="fas fa-hourglass-half"></i> Tengah Waktu (10)</button>
                        <button class="btn-opsi" id="btn-${w}-5" onclick="pilihOpsi('${w}', 5, 'akhir')"><i class="fas fa-history"></i> Akhir Waktu (5)</button>
                    </div>
                </div>`;
        });
        $("#container-jurnal").html(html);
    }

    function pilihOpsi(waktu, poin, tipeKelas) {
        $(`#card-${waktu} .btn-opsi`).removeClass("active-berjamaah active-awal active-tengah active-akhir active-uzur");
        $(`#btn-${waktu}-${poin}`).addClass("active-" + tipeKelas);
        rincianPilihan[waktu] = poin;
        if (tipeKelas === 'uzur' && 'speechSynthesis' in window) {
            let ucapan = new SpeechSynthesisUtterance("Anda memilih uzur harian.");
            ucapan.lang = "id-ID"; window.speechSynthesis.speak(ucapan);
        }
    }

    function kirimSemuaJurnal() {
        let hariIni = new Date().toISOString().split('T')[0];
        $("#sholat-loader").css("display", "flex");

        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: {
                action: "simpanPoinSholat", // Tepat menembak fungsi update data ke kanan
                nama: sesiSiswa.nama,
                tanggal: hariIni,
                rincianPoin: JSON.stringify(rincianPilihan)
            },
            dataType: "json",
            success: function(res) {
                $("#sholat-loader").hide();
                if(res.status === "success") { alert("Alhamdulillah, jurnal sholat sukses tersimpan!"); }
            },
            error: function() { $("#sholat-loader").hide(); alert("Koneksi gagal."); }
        });
    }

    function logoutSiswa() {
        if(confirm("Keluar dari halaman ini?")) { localStorage.removeItem("user_sholat"); window.location.href = "index.html"; }
    }
</script>
</body>
</html>
