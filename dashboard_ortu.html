<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantauan Jurnal Sholat - Orang Tua</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0a4227; --accent: #198754; --bg: #f4f6f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); padding-bottom: 30px; }
        .header-ortu { background: var(--primary); color: white; padding: 20px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-keluar { background: #dc3545; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .skor-box { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 12px; text-align: center; margin-top: 10px; }
        .container { max-width: 480px; margin: 20px auto; width: 92%; }
        .filter-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-top: 8px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-cari { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; }
        .log-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.04); }
        .sholat-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #eee; }
        .sholat-row:last-child { border-bottom: none; }
        .sholat-name { font-weight: 600; color: #333; }
        .sholat-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-kosong { background: #f8d7da; color: #842029; }
        .status-berjamaah { background: #d1e7dd; color: #0f5132; }
        .status-awal { background: #cff4fc; color: #055160; }
        .status-pertengahan { background: #fff3cd; color: #664d03; }
        .status-akhir { background: #f8d7da; color: #842029; }
        .loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

<div class="header-ortu">
    <div class="top-bar">
        <div>
            <p style="font-size: 12px; opacity: 0.8;">Selamat Datang Wali Murid</p>
            <h3 id="lbl-anak" style="font-size: 18px; margin-top: 2px;">Nama Anak</h3>
        </div>
        <button class="btn-keluar" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>
    <div class="skor-box">
        <p style="font-size: 11px; opacity: 0.9;">Total Akumulasi Skor Keseluruhan Waktu</p>
        <h2 style="font-size: 28px; margin-top: 2px;"><span id="total-skor">0</span> <span style="font-size: 14px;">Poin</span></h2>
    </div>
</div>

<div class="container">
    <div class="filter-card">
        <label style="font-size: 13px; font-weight: bold; color: #555;">Pilih Tanggal Riwayat Laporan</label>
        <div class="input-group">
            <input type="date" id="cari-tanggal">
            <button class="btn-cari" onclick="loadRiwayatTanggal()"><i class="fas fa-search"></i> Cari</button>
        </div>
    </div>

    <div class="log-container">
        <h4 id="judul-log" style="font-size: 14px; margin-bottom: 10px; color:#444;">Laporan Hari Ini:</h4>
        <div id="wrapper-sholat"></div>
    </div>
</div>

<div class="loader" id="dashboard-loader">
    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary); margin-bottom:10px;"></i>
    <p style="font-size: 13px; color:#555;">Menarik data amalan dari server...</p>
</div>

<script>
    const URL_DATABASE = "PASTE_LINK_WEB_APP_GOOGLE_SCRIPT_BAPAK_DISINI"; 
    let sesiOrtu = JSON.parse(localStorage.getItem("user_ortu"));

    if (!sesiOrtu) { window.location.href = "index.html"; }

    $(document).ready(function() {
        $("#lbl-anak").text(sesiOrtu.namaAnak);
        let hariIni = new Date().toISOString().split('T')[0];
        $("#cari-tanggal").val(hariIni);
        ambilDataServer(hariIni);
    });

    function ambilDataServer(tanggalTarget) {
        $("#dashboard-loader").css("display", "flex");
        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: { action: "ambilLaporanOrtu", namaAnak: sesiOrtu.namaAnak, tanggal: tanggalTarget },
            dataType: "json",
            success: function(res) {
                $("#dashboard-loader").hide();
                if (res && res.status === "success") {
                    $("#total-skor").text(res.akumulasiSkor);
                    renderDaftarSholat(res.dataSholat);
                }
            },
            error: function() { $("#dashboard-loader").hide(); alert("Gagal mengambil data riwayat."); }
        });
    }

    function renderDaftarSholat(dataSholat) {
        let htmlContent = "";
        const listWaktu = ["Subuh", "Zuhur", "Asar", "Magrib", "Isya"];
        listWaktu.forEach(waktu => {
            let poinStr = dataSholat && dataSholat[waktu] ? String(dataSholat[waktu]).trim() : "0";
            let teksStatus = "Belum Diisi / Lewat Waktu";
            let classBadge = "status-kosong";

            if (poinStr === "20") { teksStatus = "Berjamaah / Uzur (20 Poin)"; classBadge = "status-berjamaah"; }
            else if (poinStr === "15") { teksStatus = "Awal Waktu (15 Poin)"; classBadge = "status-awal"; }
            else if (poinStr === "10") { teksStatus = "Tengah Waktu (10 Poin)"; classBadge = "status-pertengahan"; }
            else if (poinStr === "5") { teksStatus = "Akhir Waktu (5 Poin)"; classBadge = "status-akhir"; }

            htmlContent += `
                <div class="sholat-row">
                    <span class="sholat-name">${waktu}</span>
                    <span class="sholat-badge ${classBadge}">${teksStatus}</span>
                </div>`;
        });
        $("#wrapper-sholat").html(htmlContent);
    }

    function loadRiwayatTanggal() {
        let tglDipilih = $("#cari-tanggal").val();
        if (!tglDipilih) return;
        let opsi = { day: 'numeric', month: 'long', year: 'numeric' };
        $("#judul-log").text("Laporan Tanggal: " + new Date(tglDipilih).toLocaleDateString('id-ID', opsi));
        ambilDataServer(tglDipilih);
    }

    function logout() {
        localStorage.removeItem("user_ortu");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
