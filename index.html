<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Digital - Masuk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #222 url('https://www.transparenttextures.com/patterns/black-thread.png');
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #111;
            border: 4px solid #444;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            text-align: center;
        }
        /* --- KOTAK HEADER DUA KOLOM (JAM & JUDUL) --- */
        .header-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
        }
        .time-box {
            border: 2px solid #8B5A2B; /* Kotak Cokelat */
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #d4a373;
            text-align: left;
            line-height: 1.4;
        }
        .time-box #live-clock {
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            display: block;
            margin-top: 3px;
        }
        .title-app {
            color: #FFFF00; /* Kuning Retro */
            font-size: 18px;
            font-weight: bold;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* TAB BUTTONS */
        .tab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #444;
            color: #aaa;
            border: 2px solid #555;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        .tab-btn.active {
            background: #2e7d32; /* Hijau Terang */
            color: #fff;
            border-color: #4caf50;
        }
        
        /* FORM STYLING */
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #bbb;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #eef2f7;
            border: 2px solid #333;
            color: #000;
            font-family: inherit;
            font-size: 14px;
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #333;
            color: #fff;
            border: 3px double #777;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #444;
            border-color: #fff;
        }
        .loader-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:99;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header-grid">
        <div class="time-box">
            <span id="live-date">Memuat...</span>
            <span id="live-clock">00:00:00</span>
        </div>
        <div class="title-app">
            Jurnal Sholat<br>Digital V1.1
        </div>
    </div>

    <div class="tab-grid">
        <button class="tab-btn active" id="btn-ananda">Menu Ananda</button>
        <button class="tab-btn" id="btn-ortu">Orang Tua</button>
    </div>

    <div class="form-group">
        <label for="input-nama">Nama Lengkap Ananda:</label>
        <input type="text" id="input-nama" placeholder="Contoh: Fia Can">
    </div>
    <div class="form-group">
        <label for="input-voucher">Kode Voucher / Password:</label>
        <input type="password" id="input-voucher" placeholder="••••">
    </div>

    <button class="btn-submit" onclick="prosesLoginSatri()">[ MASUK / DAFTAR ]</button>
</div>

<div class="loader-overlay" id="loading">
    <div style="text-align:center;"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Memproses...</p></div>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbymySKegwMDiJneEe9LvyOFEuoub-HW-DHLxcAy5A1YMzhoam4_8z3k_JIXgImccu8q/exec";
    let modeLogin = "ananda"; 

    $(document).ready(function() {
        // JAM DIGITAL REALTIME
        setInterval(function() {
            let d = new Date();
            let hari = d.toLocaleDateString('id-ID', { weekday: 'short' });
            let tgl = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            
            $("#live-date").text(hari + ", " + tgl);
            $("#live-clock").text(d.toLocaleTimeString('id-ID', { hour12: false }));
        }, 1000);

        // INTERAKSI TOMBOL MENU TAB
        $("#btn-ananda").click(function() {
            modeLogin = "ananda";
            $(this).addClass("active");
            $("#btn-ortu").removeClass("active");
            
            $("label[for='input-nama']").text("Nama Lengkap Ananda:");
            $("label[for='input-voucher']").text("Kode Voucher / Password:");
            $("#input-nama").attr("placeholder", "Contoh: Fia Can");
        });

        $("#btn-ortu").click(function() {
            modeLogin = "ortu";
            $(this).addClass("active");
            $("#btn-ananda").removeClass("active");
            
            $("label[for='input-nama']").text("Nama Lengkap Ananda:");
            $("label[for='input-voucher']").text("Password Orang Tua:");
            $("#input-nama").attr("placeholder", "Contoh: Fia Can");
        });
    });

    function prosesLoginSatri() {
        let nama = $("#input-nama").val().trim();
        let voucher = $("#input-voucher").val().trim();

        if(!nama || !voucher) return alert("Semua kolom input wajib diisi!");

        $("#loading").css("display", "flex");

        if (modeLogin === "ananda") {
            // LOGIN ANANDA
            $.ajax({
                url: URL_DATABASE, type: "GET",
                data: { action: "loginSiswa", nama: nama, password: voucher },
                dataType: "jsonp", jsonp: "callback",
                success: function(res) {
                    $("#loading").hide();
                    if(res.status === "success") {
                        localStorage.setItem("user_siswa", JSON.stringify({ nama: nama, voucher: voucher }));
                        window.location.href = "sholat.html";
                    } else {
                        alert("Gagal Masuk: " + res.message);
                    }
                },
                error: function() { $("#loading").hide(); alert("Koneksi gagal ke server database."); }
            });
        } else {
            // LOGIN ORANG TUA
            $.ajax({
                url: URL_DATABASE, type: "GET",
                data: { action: "loginOrtu", namaAnak: nama, passwordOrtu: voucher },
                dataType: "jsonp", jsonp: "callback",
                success: function(res) {
                    $("#loading").hide();
                    if(res.status === "success") {
                        localStorage.setItem("user_ortu", JSON.stringify({ namaAnak: nama }));
                        window.location.href = "dashboard_ortu.html"; 
                    } else {
                        alert("Gagal Masuk Ortu: " + res.message);
                    }
                },
                error: function() { $("#loading").hide(); alert("Koneksi gagal saat memverifikasi data Ortu."); }
            });
        }
    }
</script>
</body>
</html>
