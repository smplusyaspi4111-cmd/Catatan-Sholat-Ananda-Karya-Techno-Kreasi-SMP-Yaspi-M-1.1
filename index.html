<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Digital - SMP Yaspi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .logo-area { color: var(--primary); font-size: 45px; margin-bottom: 10px; }
        .app-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 25px; }
        .tabs { display: flex; background: #e9ecef; padding: 4px; border-radius: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #6c757d; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-submit { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; justify-content: center; align-items: center; color: white; font-size: 14px; flex-direction: column; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area"><i class="fas fa-mosque"></i></div>
    <div class="app-title">Jurnal Sholat Digital</div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="gantiTab('santri')">Menu Santri</button>
        <button class="tab-btn" onclick="gantiTab('ortu')">Orang Tua</button>
    </div>

    <div id="form-santri">
        <div class="form-group">
            <label>Nama Lengkap Ananda (Harus Unik)</label>
            <input type="text" id="nama-santri" placeholder="Contoh: Syafia">
        </div>
        <div class="form-group">
            <label>Password Akun Anak</label>
            <input type="password" id="pass-santri" placeholder="••••">
        </div>
        <button class="btn-submit" onclick="prosesLoginSantri()">Masuk / Daftar Jurnal</button>
    </div>

    <div id="form-ortu" style="display: none;">
        <div class="form-group">
            <label>Nama Lengkap Ananda</label>
            <input type="text" id="nama-anak-ortu" placeholder="Contoh: Syafia">
        </div>
        <div class="form-group">
            <label>Password Akun Orang Tua</label>
            <input type="password" id="pass-ortu" placeholder="••••••">
        </div>
        <button class="btn-submit" style="background: var(--secondary);" onclick="prosesLoginOrtu()">Pantau Jurnal Anak</button>
    </div>
</div>

<div class="loader-overlay" id="loading">
    <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 10px;"></i>
    <span id="load-text">Memeriksa data...</span>
</div>

<script>
    // Taruh URL Google Web App (/exec) Bapak di bawah ini
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbymySKegwMDiJneEe9LvyOFEuoub-HW-DHLxcAy5A1YMzhoam4_8z3k_JIXgImccu8q/exec";

    function gantiTab(tipe) {
        $(".tab-btn").removeClass("active");
        if(tipe === 'santri') {
            $(".tab-btn").eq(0).addClass("active");
            $("#form-santri").show(); $("#form-ortu").hide();
        } else {
            $(".tab-btn").eq(1).addClass("active");
            $("#form-santri").hide(); $("#form-ortu").show();
        }
    }

    function prosesLoginSantri() {
        let nama = $("#nama-santri").val().trim();
        let pass = $("#pass-santri").val().trim();
        if(!nama || !pass) { alert("Nama dan password anak harus diisi!"); return; }

        $("#loading").css("display", "flex");
        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: { action: "loginSiswa", nama: nama, password: pass },
            dataType: "json",
            success: function(res) {
                $("#loading").hide();
                if(res.status === "success") {
                    localStorage.setItem("user_siswa", JSON.stringify({ role: "siswa", nama: res.nama }));
                    window.location.href = "sholat.html";
                } else { alert(res.message); }
            },
            error: function() { $("#loading").hide(); alert("Koneksi gagal, periksa web app Anda."); }
        });
    }

    function prosesLoginOrtu() {
        let namaAnak = $("#nama-anak-ortu").val().trim();
        let passOrtu = $("#pass-ortu").val().trim();
        if(!namaAnak || !passOrtu) { alert("Nama anak dan password ortu wajib diisi!"); return; }

        $("#loading").css("display", "flex");
        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: { action: "loginOrtu", namaAnak: namaAnak, passwordOrtu: passOrtu },
            dataType: "json",
            success: function(res) {
                $("#loading").hide();
                if(res.status === "success") {
                    localStorage.setItem("user_ortu", JSON.stringify({ role: "ortu", namaAnak: res.namaAnak }));
                    window.location.href = "dashboard_ortu.html";
                } else { alert(res.message); }
            },
            error: function() { $("#loading").hide(); alert("Gagal terhubung ke database server orang tua."); }
        });
    }
</script>
</body>
</html>
