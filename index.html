<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Jurnal Sholat Digital - SMP Yaspi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f5132; --secondary: #198754; --accent: #0d6efd; --bg: #f1f3f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .main-container { background: white; width: 100%; max-width: 450px; border-radius: 15px; padding: 30px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; }
        .logo-area { color: var(--primary); margin-bottom: 25px; }
        .logo-area i { font-size: 50px; margin-bottom: 10px; }
        .logo-area h2 { font-size: 22px; font-weight: bold; }
        .logo-area p { font-size: 13px; color: #666; margin-top: 5px; }

        .role-selection { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .card-role { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; text-align: left; }
        .card-role:hover { border-color: var(--secondary); background: #f0fdf4; transform: translateY(-2px); }
        .card-role .icon-box { width: 50px; height: 50px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 22px; color: white; }
        .role-siswa .icon-box { background: var(--secondary); }
        .role-ortu .icon-box { background: var(--accent); }
        .card-role h3 { font-size: 16px; color: #333; }
        .card-role p { font-size: 12px; color: #777; }

        .form-panel { display: none; margin-top: 20px; text-align: left; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--primary); }
        
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-option { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }

        .btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-submit-siswa { background: var(--secondary); }
        .btn-submit-ortu { background: var(--accent); }
        .btn-back { display: block; text-align: center; color: #666; font-size: 13px; margin-top: 15px; text-decoration: none; cursor: pointer; }
        .btn-back:hover { color: black; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; color: white; flex-direction: column; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-area">
        <i class="fas fa-mosque"></i>
        <h2>SMP YASPI</h2>
        <p>Sistem Informasi & Jurnal Sholat Digital Realtime</p>
    </div>

    <div id="panel-akses" class="role-selection">
        <div class="card-role role-siswa" onclick="pilihAkses('siswa')">
            <div class="icon-box"><i class="fas fa-user-graduate"></i></div>
            <div>
                <h3>Akses Login Siswa</h3>
                <p>Isi & simpan data sholat harian mandiri</p>
            </div>
        </div>
        <div class="card-role role-ortu" onclick="pilihAkses('ortu')">
            <div class="icon-box"><i class="fas fa-user-friends"></i></div>
            <div>
                <h3>Akses Orang Tua / Wali</h3>
                <p>Pantau akumulasi skor & riwayat sholat anak</p>
            </div>
        </div>
    </div>

    <div id="form-siswa" class="form-panel">
        <h3 style="margin-bottom: 15px; color: var(--secondary);"><i class="fas fa-user-graduate"></i> Menu Santri</h3>
        <div class="form-group">
            <label>Nama Lengkap Ananda</label>
            <input type="text" id="nama-siswa" class="form-control" placeholder="Ketik nama lengkap...">
        </div>
        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="jk" value="L"> Laki-laki (L)</label>
                <label class="radio-option"><input type="radio" name="jk" value="P"> Perempuan (P)</label>
            </div>
        </div>
        <div class="form-group">
            <label>Password Anda (Kolom C)</label>
            <input type="password" id="pass-siswa" class="form-control" placeholder="Buat/masukkan password anak...">
        </div>
        <button class="btn-submit btn-submit-siswa" onclick="loginSiswa()">Masuk Jurnal Sholat <i class="fas fa-arrow-right"></i></button>
        <span class="btn-back" onclick="kembaliKeMenu()"><i class="fas fa-arrow-left"></i> Kembali</span>
    </div>

    <div id="form-ortu" class="form-panel">
        <h3 style="margin-bottom: 15px; color: var(--accent);"><i class="fas fa-user-friends"></i> Pantauan Orang Tua</h3>
        <div class="form-group">
            <label>Nama Lengkap Ananda (Anak)</label>
            <input type="text" id="nama-anak" class="form-control" placeholder="Ketik nama anak Anda dengan tepat...">
        </div>
        <div class="form-group">
            <label>Password Orang Tua (Kolom F)</label>
            <input type="password" id="pass-ortu" class="form-control" placeholder="Masukkan password khusus orang tua...">
        </div>
        <button class="btn-submit btn-submit-ortu" onclick="loginOrangTua()">Lihat Laporan Grafik Anak <i class="fas fa-chart-line"></i></button>
        <span class="btn-back" onclick="kembaliKeMenu()"><i class="fas fa-arrow-left"></i> Kembali</span>
    </div>
</div>

<div class="loading-overlay" id="login-loader">
    <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 10px;"></i>
    <span id="loader-text">Menghubungkan ke server pusat...</span>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbxp5--kcFxG519l-XvIUULN8A_mXkqGk-0estP6x_ylMAti1q0KwPymlpzI4m4HlQfE/exec"; 

    // Pengecekan Ingat Saya (LocalStorage otomatis)
    $(document).ready(function() {
        let cekSiswa = localStorage.getItem("user_sholat");
        let cekOrtu = localStorage.getItem("user_ortu");
        
        if (cekSiswa) {
            window.location.href = "sholat.html";
        } else if (cekOrtu) {
            window.location.href = "dashboard_ortu.html";
        }
    });

    function pilihAkses(role) {
        $("#panel-akses").hide();
        if(role === 'siswa') {
            $("#form-siswa").fadeIn();
        } else {
            $("#form-ortu").fadeIn();
        }
    }

    function kembaliKeMenu() {
        $(".form-panel").hide();
        $("#panel-akses").fadeIn();
    }

    function loginSiswa() {
        let nama = $("#nama-siswa").val().trim();
        let jk = $("input[name='jk']:checked").val();
        let password = $("#pass-siswa").val().trim();

        if(!nama || !jk || !password) {
            alert("Harap lengkapi Nama, Jenis Kelamin, dan Password Anak!");
            return;
        }

        // Langsung simpan ke localstorage sebagai identitas dasar (Konsep Ingat Saya)
        let dataSesi = { role: "siswa", nama: nama, jk: jk, passAnak: password };
        localStorage.setItem("user_sholat", JSON.stringify(dataSesi));
        
        // Alihkan langsung ke halaman pengisian sholat siswa
        window.location.href = "sholat.html";
    }

    function loginOrangTua() {
        let namaAnak = $("#nama-anak").val().trim();
        let passOrtu = $("#pass-ortu").val().trim();

        if(!namaAnak || !passOrtu) {
            alert("Harap isi Nama Anak dan Password Orang Tua!");
            return;
        }

        $("#login-loader").css("display", "flex");

        // Cek kecocokan kombinasi Nama Anak dan Password Ortu ke database sheet
        $.ajax({
            url: URL_DATABASE,
            type: "GET",
            data: { action: "loginOrtuNew", namaAnak: namaAnak, passOrtu: passOrtu },
            dataType: "json",
            success: function(res) {
                $("#login-loader").hide();
                if (res && res.status === "success") {
                    // Berhasil terverifikasi, otomatis dinobatkan sebagai Ortu (Nama Anak)
                    let dataSesiOrtu = { role: "ortu", labelNama: "Ortu " + res.namaAnak, anak: res.namaAnak };
                    localStorage.setItem("user_ortu", JSON.stringify(dataSesiOrtu));
                    window.location.href = "dashboard_ortu.html";
                } else {
                    alert("Akses Ditolak: " + res.message);
                }
            },
            error: function() {
                $("#login-loader").hide();
                alert("Gangguan jaringan. Sinkronisasi database gagal.");
            }
        });
    }
</script>
</body>
</html>
