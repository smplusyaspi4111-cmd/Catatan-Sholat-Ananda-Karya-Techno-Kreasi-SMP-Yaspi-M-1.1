<!html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerbang Jurnal Sholat Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <style>
    /* 1. LATAR BELAKANG THEMA MINECRAFT CHERRY BLOSSOM */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Menggunakan gambar pemandangan pixelated mnc sebagai latar belakang */
      background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), 
                  url('https://images.unsplash.com/photo-1627856013091-fed6e4e30025?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
    }

    /* 2. KOTAK CONTAINER UTAMA */
    .minecraft-container {
      background: rgba(16, 16, 16, 0.85); /* Hitam transparan khas menu Minecraft */
      border: 4px solid #3c3c3c;
      outline: 4px solid #000000;
      padding: 30px 20px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }

    /* 3. JUDUL GAME (JURNAL SHOLAT) */
    .minecraft-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      color: #FFFF55; /* Warna Kuning Terang khas splash text Minecraft */
      text-shadow: 3px 3px #3F3F00;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* 4. TOMBOL MENU TAB (SANTRI / ORANG TUA) */
    .tab-group {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    
    .tab-btn {
      flex: 1;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      color: #E0E0E0;
      background: #555555;
      border: 2px solid #A8A8A8;
      border-bottom: 4px solid #000000;
      border-right: 4px solid #000000;
      padding: 12px 5px;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #3c8527; /* Hijau Rumput Aktif */
      border-color: #55FF55;
      color: #FFFFFF;
    }

    /* 5. GAYA INPUT FORM KOTAK-KOTAK */
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      color: #AAAAAA;
      display: block;
      margin-bottom: 8px;
    }

    .minecraft-input {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      background: #000000;
      border: 2px solid #555555;
      color: #00FF00; /* Tulisan Hijau Komputer di dalam Input */
      padding: 12px;
      outline: none;
    }
    
    .minecraft-input:focus {
      border-color: #FFFF55; /* Border jadi kuning saat diklik */
    }

    /* 6. TOMBOL MASUK UTAMA MC STYLE (3D GRAY BUTTON) */
    .minecraft-btn {
      width: 100%;
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      color: #E0E0E0;
      background: #767676;
      border: 3px solid #A8A8A8;
      border-bottom: 5px solid #000000;
      border-right: 5px solid #000000;
      padding: 15px;
      cursor: pointer;
      text-shadow: 2px 2px #3F3F3F;
      margin-top: 15px;
    }

    .minecraft-btn:hover {
      background: #8c8c8c;
      border-color: #c1c1c1;
      color: #FFFF55;
    }

    .minecraft-btn:active {
      border-bottom: 2px solid #A8A8A8;
      border-right: 3px solid #A8A8A8;
      margin-top: 18px;
      margin-bottom: -3px;
    }
    
    /* Animasi loading sederhana ala text game */
    .status-text {
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      color: #55FFFF;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="minecraft-container">
    <div class="minecraft-title">JURNAL SHOLAT<br>DIGITAL V1.1</div>
    
    <div class="tab-group">
      <button class="tab-btn active" id="btnSantri" onclick="setTab('santri')">Menu Santri</button>
      <button class="tab-btn" id="btnOrtu" onclick="setTab('ortu')">Orang Tua</button>
    </div>
    
    <div id="formSiswa">
      <div class="form-group">
        <label>Nama Lengkap Ananda:</label>
        <input type="text" class="minecraft-input" id="namaSiswa" placeholder="Ketik nama...">
      </div>
      <div class="form-group">
        <label>Kode Voucher / Password:</label>
        <input type="password" class="minecraft-input" id="pwSiswa" placeholder="****">
      </div>
    </div>

    <div id="formOrtu" style="display:none;">
      <div class="form-group">
        <label>Nama Lengkap Anak:</label>
        <input type="text" class="minecraft-input" id="namaAnakOrtu" placeholder="Nama anak...">
      </div>
      <div class="form-group">
        <label>Password Orang Tua:</label>
        <input type="password" class="minecraft-input" id="pwOrtu" placeholder="****">
      </div>
    </div>
    
    <button class="minecraft-btn" onclick="prosesMasuk()">[ MASUK / DAFTAR ]</button>
    
    <div class="status-text" id="statusServer">Memeriksa data ke server...</div>
  </div>

  <script>
    var currentTab = 'santri';

    function setTab(tab) {
      currentTab = tab;
      if (tab === 'santri') {
        $('#btnSantri').addClass('active');
        $('#btnOrtu').removeClass('active');
        $('#formSiswa').show();
        $('#formOrtu').hide();
      } else {
        $('#btnOrtu').addClass('active');
        $('#btnSantri').removeClass('active');
        $('#formOrtu').show();
        $('#formSiswa').hide();
      }
    }

   // URL WEB APP DEPLOYMENT GOOGLE APPS SCRIPT BAPAK
    var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymySKegwMDiJneEe9LvyOFEuoub-HW-DHLxcAy5A1YMzhoam4_8z3k_JIXgImccu8q/exec";
    var currentTab = 'santri';

    function setTab(tab) {
      currentTab = tab;
      if (tab === 'santri') {
        $('#btnSantri').addClass('active');
        $('#btnOrtu').removeClass('active');
        $('#formSiswa').show();
        $('#formOrtu').hide();
      } else {
        $('#btnOrtu').addClass('active');
        $('#btnSantri').removeClass('active');
        $('#formOrtu').show();
        $('#formSiswa').hide();
      }
    }

    function prosesMasuk() {
      var nama, password;
      
      if (currentTab === 'santri') {
        nama = $('#namaSiswa').val().trim();
        password = $('#pwSiswa').val().trim();
      } else {
        nama = $('#namaAnakOrtu').val().trim();
        password = $('#pwOrtu').val().trim();
      }

      if (nama === "" || password === "") {
        alert("Waduh! Nama dan Password/Voucher tidak boleh kosong, Pak!");
        return;
      }

      // Efek loading text ala Minecraft
      $('#statusServer').text("Menghubungkan ke server Minecraft...").fadeIn();
      $('.minecraft-btn').prop('disabled', true).css('opacity', '0.6');

      // ==================== JALUR LOGIN ORANG TUA ====================
      if (currentTab === 'ortu') {
        $.ajax({
          url: WEB_APP_URL,
          type: "GET",
          dataType: "jsonp",
          data: {
            action: "loginOrtu",
            namaAnak: nama,
            passwordOrtu: password
          },
          success: function(response) {
            RESET_TOMBOL();
            if (response.status === "success") {
              alert("Login Orang Tua Berhasil! Membuka Dashboard Pantauan...");
              window.location.href = "dashboard_ortu.html?namaAnak=" + encodeURIComponent(response.namaAnak);
            } else {
              alert("Gagal: " + response.message);
            }
          },
          error: function() { RESET_TOMBOL(); AMBIL_EROR(); }
        });
        return;
      }

      // ==================== JALUR LOGIN / DAFTAR SANTRI ====================
      // Langkah 1: Cek dulu apakah nama anak sudah ada di database Google Sheets
      $.ajax({
        url: WEB_APP_URL,
        type: "GET",
        dataType: "jsonp",
        data: {
          action: "cekUserSiswa",
          nama: nama
        },
        success: function(cekResponse) {
          // Tentukan apakah user baru atau lama berdasarkan database
          var isBaruUser = cekResponse.ditemukan ? "false" : "true";
          var pesanLoading = isBaruUser === "true" ? "Memproses Kode Voucher Baru..." : "Mencocokkan Password Akun...";
          $('#statusServer').text(pesanLoading);

          // Langkah 2: Kirim data loginSiswa dengan status isBaru yang tepat
          $.ajax({
            url: WEB_APP_URL,
            type: "GET",
            dataType: "jsonp",
            data: {
              action: "loginSiswa",
              nama: nama,
              password: password,
              gender: "L", // Default gender, bisa disesuaikan nanti
              isBaru: isBaruUser
            },
            success: function(loginResponse) {
              RESET_TOMBOL();
              if (loginResponse.status === "success") {
                if (isBaruUser === "true") {
                  alert("Selamat! Pendaftaran Akun Berhasil via Voucher!");
                } else {
                  alert("Selamat Datang Kembali! Login Berhasil!");
                }
                window.location.href = "sholat.html?nama=" + encodeURIComponent(loginResponse.nama);
              } else {
                alert("Gagal: " + loginResponse.message);
              }
            },
            error: function() { RESET_TOMBOL(); AMBIL_EROR(); }
          });
        },
        error: function() { RESET_TOMBOL(); AMBIL_EROR(); }
      });
    }

    function RESET_TOMBOL() {
      $('#statusServer').fadeOut();
      $('.minecraft-btn').prop('disabled', false).css('opacity', '1');
    }

    function AMBIL_EROR() {
      alert("Gagal menghubungi server Google! Periksa koneksi internet atau setelan Deployment script Anda.");
    }
